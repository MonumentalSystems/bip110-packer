name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: fmt · clippy · build · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable) with rustfmt + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --locked -- -D warnings

      - name: Build (release)
        run: cargo build --release --locked

      - name: Test (unit + enforcement battery)
        run: cargo test --locked

      # NOTE: scripts/regtest-demo.sh and scripts/enforce-demo.sh drive a live
      # bitcoind/Knots node (and the BIP-110 activation client) and are run
      # manually — they are not part of CI because they need external binaries.

  publish-dry-run:
    name: crates.io publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo publish --dry-run
        run: cargo publish --dry-run --locked
